{% load static leaflet_tags %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AbasteceAí</title>
{% leaflet_js %}
{% leaflet_css %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="container">
  <header class="header">
    <div class="brand">
      <div class="brand-icon"></div>
      <span class="brand-name">AbasteceAí</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" title="Notificações"></button>
      <button class="icon-btn" title="Perfil"></button>
      <button class="icon-btn" title="Sair">→</button>
    </div>
  </header>

  <!-- MAPA -->
  <div class="map">
{% leaflet_map "map" callback="window.mapInit" %}
    <button id="btn-localizar" onclick="localizarUsuario()"> Minha localização</button>
    <div id="status-geo"></div>
  </div>

  <!-- BUSCA -->
  <div class="search-row">
    <div class="search">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Buscar posto, endereço ou cidade..." id="busca" oninput="filtrarPostos()" />
    </div>
    <button class="filter-btn">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      <span class="badge">25</span>
    </button>
  </div>

  <!-- AÇÕES -->
  <div class="actions">
    <button class="btn grow">+ Informar Preço</button>
    <button class="btn grow">✓ Validar Preços</button>
    <button class="btn square"></button>
    <button class="btn square"></button>
  </div>

  <!-- ABAS DE COMBUSTÍVEL -->
  <div class="tabs">
    <button class="tab active" onclick="selecionarAba(this)">Gasolina</button>
    <button class="tab" onclick="selecionarAba(this)">Etanol</button>
    <button class="tab" onclick="selecionarAba(this)">Aditivada</button>
    <button class="tab" onclick="selecionarAba(this)">Diesel S10</button>
    <button class="tab" onclick="selecionarAba(this)">Diesel S500</button>
    <button class="tab" onclick="selecionarAba(this)">GNV</button>
  </div>

  <!-- TOP 3 MAIS BARATOS -->
  <div class="top-card">
    <h2><span class="trophy"></span> Postos Mais Baratos — <span id="aba-titulo">Gasolina</span></h2>
    <div class="top-list" id="top-list">
      <p style="color:var(--muted);font-size:14px">Carregando...</p>
    </div>
  </div>

  <p class="meta" id="meta-texto"></p>

  <!-- LISTA DE POSTOS -->
  <section class="stations" id="lista-postos"></section>
</div>

<script>
  // o mapa, o tile layer e o centro/zoom padrão vêm do LEAFLET_CONFIG no settings.py
  // a tag leaflet_map do template já cria o mapa e chama a mapInit quando ele fica pronto
  let map;
  let marcadorUsuario = null;
  let userLatLng = null;
  let todosPostos = []; // guarda todos os postos vindos do backend, sem filtro

  // ícone redondo azul pra marcar onde o usuário está no mapa
  const iconeUsuario = L.divIcon({
    html: '<div style="width:14px;height:14px;background:#378ADD;border-radius:50%;border:3px solid white;box-shadow:0 0 0 2px #378ADD"></div>',
    iconSize: [20, 20], iconAnchor: [10, 10], className: ''
  });

  // chamada automaticamente pelo leaflet quando o mapa termina de carregar.
  // a partir daqui a gente busca os postos no django e desenha tudo na tela
  function mapInit(leafletMap, options) {
    map = leafletMap;

    fetch("{% url 'postos-geojson' %}")
      .then(r => r.json())
      .then(data => {
        todosPostos = data.features;
        renderizarTudo(todosPostos);
      });
  }

  // recebe a lista de postos e atualiza tudo de uma vez: marcadores no mapa,
  // a lista embaixo e o top 3 mais barato
  function renderizarTudo(postos) {
    // tira os marcadores antigos do mapa, mas deixa o marcador do usuário
    map.eachLayer(l => { if (l instanceof L.Marker && l !== marcadorUsuario) map.removeLayer(l); });

    postos.forEach(f => {
      const p = f.properties;
      const [lng, lat] = f.geometry.coordinates;
      let distHTML = '';
      if (userLatLng) {
        const dist = (userLatLng.distanceTo(L.latLng(lat, lng)) / 1000).toFixed(1);
        distHTML = `<br><small>${dist} km de você</small>`;
      }
      L.marker([lat, lng]).addTo(map).bindPopup(`
        <strong>${p.nome}</strong><br>${p.endereco}${distHTML}
        <hr style="margin:4px 0">
        R$ ${p.gasolina || '–'} &nbsp; R$ ${p.etanol || '–'}
      `);
    });

    renderizarLista(postos);
    renderizarTop(postos);
    document.getElementById('meta-texto').textContent = `${postos.length} postos encontrados`;
  }

  // monta os cards da lista de postos que fica embaixo do mapa
  function renderizarLista(postos) {
    const el = document.getElementById('lista-postos');
    if (!postos.length) { el.innerHTML = '<p style="color:var(--muted)">Nenhum posto encontrado.</p>'; return; }

    el.innerHTML = postos.map(f => {
      const p = f.properties;
      const [lng, lat] = f.geometry.coordinates;
      let distStr = '';
      if (userLatLng) {
        const dist = (userLatLng.distanceTo(L.latLng(lat, lng)) / 1000).toFixed(1);
        distStr = `<span class="dist">➤ ${dist} km</span>`;
      }
      return `
        <article class="station">
          <div>
            <h3>${p.nome}</h3>
            <div class="addr">${p.endereco}</div>
            <div class="info">
              ${distStr}
              ${p.gasolina ? `<span> R$ ${p.gasolina}</span>` : ''}
              ${p.etanol ? `<span>R$ ${p.etanol}</span>` : ''}
            </div>
          </div>
          <div class="station-actions">
            <div class="no-price">${p.gasolina ? '' : 'Sem preço'}</div>
          </div>
        </article>`;
    }).join('');
  }

  // pega só os postos que têm preço de gasolina cadastrado e mostra
  // os 3 mais baratos no card do topo
  function renderizarTop(postos) {
    const comPreco = postos.filter(f => f.properties.preco_gasolina || f.properties.gasolina);
    const el = document.getElementById('top-list');
    if (!comPreco.length) { el.innerHTML = '<p style="color:var(--muted);font-size:14px">Sem preços cadastrados ainda.</p>'; return; }

    el.innerHTML = comPreco.slice(0, 3).map((f, i) => {
      const p = f.properties;
      return `<div class="top-row">
        <span class="rank">${i + 1}º</span>
        <div><div class="station-name">${p.nome}</div><div class="station-sub">${p.endereco}</div></div>
        <span class="price">↘ R$ ${p.gasolina || p.preco_gasolina}</span>
      </div>`;
    }).join('');
  }

  // filtra os postos pelo que foi digitado na busca, comparando com o nome
  // e o endereço (ignorando maiúscula/minúscula)
  function filtrarPostos() {
    const q = document.getElementById('busca').value.toLowerCase();
    const filtrados = todosPostos.filter(f =>
      f.properties.nome.toLowerCase().includes(q) ||
      f.properties.endereco.toLowerCase().includes(q)
    );
    renderizarTudo(filtrados);
  }

  // troca a aba de combustível ativa (gasolina, etanol, etc) e atualiza
  // o título que aparece no card do top 3
  function selecionarAba(el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('aba-titulo').textContent = el.textContent;
  }

  // pede pro navegador a localização atual do usuário (gps/wifi), marca
  // ela no mapa e recalcula a distância de cada posto a partir daí
  function localizarUsuario() {
    if (!navigator.geolocation) { alert('Navegador não suporta geolocalização.'); return; }
    setStatus('Obtendo sua localização...');

    navigator.geolocation.getCurrentPosition(
      pos => {
        userLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        if (marcadorUsuario) map.removeLayer(marcadorUsuario);
        marcadorUsuario = L.marker(userLatLng, { icon: iconeUsuario })
          .addTo(map).bindPopup('Você está aqui').openPopup();
        map.setView(userLatLng, 14);
        setStatus('Localização encontrada!', 2000);
        renderizarTudo(todosPostos); // recalcula as distâncias com a nova posição
      },
      err => {
        // 1 = permissão negada, 2 = posição indisponível, 3 = deu timeout
        const msgs = { 1: 'Permissão negada.', 2: 'Posição indisponível.', 3: 'Tempo esgotado.' };
        setStatus(msgs[err.code] || 'Erro.', 4000);
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  // mostra uma mensagem no balãozinho embaixo do mapa. se passar um tempo
  // em ms, ela desaparece sozinha
  function setStatus(msg, ms = null) {
    const el = document.getElementById('status-geo');
    el.textContent = msg; el.style.display = 'block';
    if (ms) setTimeout(() => el.style.display = 'none', ms);
  }
</script>
</body>
</html>
