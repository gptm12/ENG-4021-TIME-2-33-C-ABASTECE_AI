{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Posto - AbasteceAi</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Editar Posto</h1>
        </header>
        <form method="post">
            {% csrf_token %}
            <div class="form-grupo">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" value="{{ posto.nome }}">
            </div>
            <div class="form-grupo">
                <label for="bandeira">Bandeira</label>
                <input type="text" id="bandeira" name="bandeira" value="{{ posto.bandeira }}">
            </div>
            <div class="form-grupo">
                <label for="endereco">Endereço</label>
                <input type="text" id="endereco" name="endereco" value="{{ posto.endereco }}">
            </div>
            <div class="form-grupo">
                <label for="avaliacao">Avaliação (0 a 5)</label>
                <input type="number" id="avaliacao" name="avaliacao" step="0.1" min="0" max="5" value="{{ posto.avaliacao }}">
            </div>
            <button type="submit" class="botao">Salvar</button>
            <a href="{% url 'home' %}" class="botao botao-secundario">Cancelar</a>
        </form>
    </div>
</body>
</html>
