{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Postos de Combustível</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        #map { height: 100vh; }
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializa o mapa centrado no Brasil
        const map = L.map('map').setView([-15.7801, -47.9292], 5);

        // Camada de tiles (OpenStreetMap - gratuito)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Busca os postos como GeoJSON e plota no mapa
        fetch("{% url 'postos-geojson' %}")
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pointToLayer: (feature, latlng) => L.marker(latlng),
                    onEachFeature: (feature, layer) => {
                        const p = feature.properties;
                        layer.bindPopup(`
                            <strong>${p.nome}</strong><br>
                            ${p.endereco}<br><br>
                            ⛽ Gasolina: R$ ${p.gasolina}<br>
                            🌿 Etanol: R$ ${p.etanol}<br>
                            🚛 Diesel: R$ ${p.diesel}
                        `);
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
