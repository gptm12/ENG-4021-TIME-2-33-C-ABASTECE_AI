{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - AbasteceAi</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AbasteceAi</h1>
        </header>
        <h2 style="text-align:center; margin-bottom:20px;">Criar conta</h2>
        {% if erro %}
            <p style="color:red; text-align:center;">{{ erro }}</p>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-grupo">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" placeholder="Escolha um nome de usuário">
            </div>
            <div class="form-grupo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Escolha uma senha">
            </div>
            <div class="form-grupo">
                <label for="confirmar">Confirmar senha</label>
                <input type="password" id="confirmar" name="confirmar" placeholder="Repita a senha">
            </div>
            <button type="submit" class="botao">Cadastrar</button>
            <a href="{% url 'login' %}" class="botao botao-secundario">Já tenho conta</a>
        </form>
    </div>
</body>
</html>
