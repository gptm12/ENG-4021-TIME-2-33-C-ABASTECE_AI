<h1>Atualizar Posto</h1>

<form method="post" action="/atualizar_posto/{{ posto.id }}/">
    {% csrf_token %}
    <div>
        <label>Nome do posto:</label>
        <input value="{{ posto.nome }}" name="nome" type="text">
    </div>

    <div>
        <label>Endereço:</label>
        <input value="{{ posto.endereco }}" name="endereco" type="text">
    </div>

    <div>
        <label>Latitude:</label>
        <input value="{{ posto.latitude }}" name="latitude" type="number" step="0.0001">
    </div>

    <div>
        <label>Longitude:</label>
        <input value="{{ posto.longitude }}" name="longitude" type="number" step="0.0001">
    </div>

    <input type="submit" value= "Atualizar">


</form>
