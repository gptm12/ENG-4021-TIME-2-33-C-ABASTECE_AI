<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AbasteceAí — Entrar</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <!-- Logo centralizada -->
            <div class="brand">
                <div class="brand-logo" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="22" x2="15" y2="22"></line>
                        <line x1="4" y1="9" x2="14" y2="9"></line>
                        <path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"></path>
                        <path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2a2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"></path>
                    </svg>
                </div>
                <h1 class="brand-name">AbasteceAí</h1>
                <p class="brand-tagline">Encontre os melhores preços de combustível</p>
            </div>

            <!-- Botão Google REMOVIDO -->
            <!-- Divisor REMOVIDO -->

            <!-- Formulário de Login -->
            <form class="auth-form" method="POST" action="#">
                {% csrf_token %}
                
                <div class="field">
                    <label class="field-label" for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required />
                </div>

                <div class="field">
                    <label class="field-label" for="password">Senha</label>
                    <div class="password-wrap">
                        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
                        <button type="button" class="toggle-pass" aria-label="Mostrar senha" onclick="togglePassword()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <p class="signup-line">
                Não tem conta? <a href="#">Cadastre-se</a>
            </p>
        </section>
    </main>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
        }
    </script>
</body>
</html>
