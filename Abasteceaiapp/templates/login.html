{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - AbasteceAi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AbasteceAi</h1>
        </header>
        <h2 style="text-align:center; margin-bottom:20px;">Entrar na conta</h2>
        <form>
            <div class="form-grupo">
                <label for="email"><i class="bi bi-envelope"></i> E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>
            <div class="form-grupo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha">
            </div>
            <button type="submit" class="botao">Entrar</button>
            <a href="{% url 'criar-conta' %}" class="botao botao-secundario">Criar conta</a>
        </form>
        <p class="link-rodape">
            <a href="#">Esqueci minha senha</a>
        </p>
    </div>
</body>
</html>
